name: Build Nvidia GLX App Image

on:
  push:
    branches:
      - nvidia-glx-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: ">=1.20"

      - name: Build joystick-server
        run: bash .beagle/build.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push Docker image - nvidia-glx-app
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./.beagle/nvidia-glx-app.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:1.0.12-glx
            ghcr.io/${{ github.repository }}:latest-glx
            registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:1.0.12-glx
            registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:latest-glx
          platforms: linux/amd64
          build-args: |
            BASE=ghcr.io/${{ github.repository }}:nvidia-glx-desktop-latest

      - name: Image push success
        run: echo "Docker image pushed successfully to ghcr.io/${{ github.repository }}:1.0.12-glx"
