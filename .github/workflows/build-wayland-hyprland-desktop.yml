name: Build Wayland Hyprland Desktop Image

on:
  push:
    branches:
      - wayland-hyprland-desktop

jobs:
  build-wayland-hyprland-desktop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push Docker image - wayland-hyprland-desktop
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./.beagle/wayland-hyprland-desktop.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:1.1.0
            ghcr.io/${{ github.repository }}:latest-wayland
            registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:1.1.0
            registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:latest-wayland
          platforms: linux/amd64
          build-args: |
            BASE=ghcr.io/open-beagle/beagle-wind-vnc:1.1.0-base
          no-cache: true

      - name: Image push success
        run: echo "Docker image pushed successfully to registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:1.1.0"
