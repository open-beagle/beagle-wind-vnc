name: Build Nvidia Base Image

on:
  push:
    branches:
      - kde5-base

jobs:
  build-nvidia-base:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image - nvidia-base
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./.beagle/kde5-base.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:1.0.13-base
            ghcr.io/${{ github.repository }}:latest-base
          platforms: linux/amd64
          build-args: |
            BASE=ubuntu:24.04
          no-cache: true

      - name: Image push success - nvidia-base
        run: echo "Docker image pushed successfully to ghcr.io/${{ github.repository }}:1.0.13-base"
