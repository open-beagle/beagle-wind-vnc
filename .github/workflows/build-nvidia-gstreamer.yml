name: Build GStreamer Base Image

on:
  push:
    branches:
      - nvidia-gstreamer

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push Docker image - nvidia-gstreamer
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./.beagle/nvidia-gstreamer.Dockerfile
          push: true
          tags: |
            registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:build-1.24.6
          platforms: linux/amd64

      - name: Image push success
        run: echo "Docker image pushed successfully to registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:build-1.24.6"
