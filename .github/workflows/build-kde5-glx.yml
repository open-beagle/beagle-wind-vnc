name: Build KDE5 GLX Image

on:
  push:
    branches:
      - kde5-glx

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push Docker image - kde5-glx
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./.beagle/kde5-app.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:1.0.13-glx
            ghcr.io/${{ github.repository }}:latest-glx
            registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:1.0.13-glx
            registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:latest-glx
          platforms: linux/amd64
          build-args: |
            BASE=ghcr.io/open-beagle/beagle-wind-vnc:1.0.13-desktop
            RENDER_ENGINE=GLX

      - name: Image push success
        run: echo "Docker image pushed successfully to ghcr.io/${{ github.repository }}:1.0.13-glx"
