name: Build Nvidia GLX Desktop Image

on:
  push:
    branches:
      - nvidia-glx-desktop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: ">=1.20"

      - name: Build joystick-server
        run: bash .beagle/build.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image - nvidia-glx-desktop
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./.beagle/nvidia-glx-desktop.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:nvidia-glx-desktop-latest
          platforms: linux/amd64
          build-args: |
             BASE=ghcr.io/${{ github.repository }}:nvidia-glx-base-latest

      - name: Image push success
        run: echo "Docker image pushed successfully to ghcr.io/${{ github.repository }}:nvidia-glx-desktop-latest"
