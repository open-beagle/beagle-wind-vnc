name: Build KDE5 Desktop Image

on:
  push:
    branches:
      - kde5-desktop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image - kde5-desktop
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./.beagle/kde5-desktop.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:1.0.14-desktop
            ghcr.io/${{ github.repository }}:latest-desktop
          platforms: linux/amd64
          build-args: |
            BASE=ghcr.io/open-beagle/beagle-wind-vnc:1.0.14-base

      - name: Image push success
        run: echo "Docker image pushed successfully to ghcr.io/${{ github.repository }}:1.0.14-desktop"
