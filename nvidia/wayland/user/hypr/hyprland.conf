# =============================================================================
# Full Desktop Hyprland Config for Beagle-Wind Cloud Gaming
# =============================================================================

# 强制限制 Headless 环境为 60FPS，禁止 preferred 野生刷新率导致的无限渲染循环死锁
monitor=,1920x1080@60,auto,1,bitdepth,10

# Environment Variables for headless DRM render node
env = AQ_NO_LINUX_DMABUF,1
# P8-E1 (2026-04-23): pixman CPU 渲染已终结！GPU 硬件渲染验证通过。
# 实测: OpenGL ES 3.2 NVIDIA 595.58.03, RTX 4090, 620MiB 显存稳定无泄漏。
# 不设置 WLR_RENDERER，让 Hyprland/Aquamarine 自动选择最佳 GPU 渲染器。
# env = WLR_RENDERER,pixman  # [已废弃] CPU 软件渲染，项目级降级方案
env = XCURSOR_THEME,transparent
env = XCURSOR_SIZE,24
# env = WLR_DRM_NO_ATOMIC,1

# Execute essential desktop components
exec-once = hyprctl setcursor transparent 24
exec-once = kded6
exec-once = waybar
exec-once = foot
exec-once = swaybg -i /usr/share/backgrounds/beagle/default.png -m fill
# General aesthetic settings
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# Decoration (Rounding, Blur, Shadows) — D-3: 关闭 blur/shadow 消除空桌面持续重绘
decoration {
    rounding = 10
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# 视觉净空指令（Visual Clearance Protocol） 
# 2. 从 Hyprland 灵魂层面处决默认光标和一切位姿篡改
cursor {
    no_hardware_cursors = true
    enable_hyprcursor = false
    hide_on_key_press = true
    no_warps = true
}

# Beautiful animations
animations {
    enabled = false
}

# Misc settings
misc {
    vfr = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vrr = 0
}

# Debug — 启用日志便于排障
debug {
    disable_logs = false
}

# Input mapping (uinput from remote stream)
input {
    kb_layout = us
    follow_mouse = 1
    # Raw input directly from Wayland/uinput
    sensitivity = 0
    accel_profile = flat
}

# Basic Desktop Keybindings (Super Key)
$mainMod = SUPER
bind = $mainMod, Q, exec, foot
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, F, fullscreen, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, E, exec, dolphin

