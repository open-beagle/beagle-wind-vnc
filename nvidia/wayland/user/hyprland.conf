# =============================================================================
# Full Desktop Hyprland Config for Beagle-Wind Cloud Gaming
# =============================================================================

# 强制限制 Headless 环境为 60FPS，禁止 preferred 野生刷新率导致的无限渲染循环死锁
monitor=,1920x1080@60,auto,1,bitdepth,10

# Environment Variables for headless DRM render node
env = AQ_NO_LINUX_DMABUF,1
env = WLR_RENDERER,pixman
env = XCURSOR_THEME,transparent
env = XCURSOR_SIZE,24
# env = WLR_DRM_NO_ATOMIC,1

# Execute essential desktop components (Cursor Fallback)
exec-once = hyprctl setcursor transparent 24

# General aesthetic settings
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# Decoration (Rounding, Blur, Shadows)
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# 视觉净空指令（Visual Clearance Protocol） 
# 2. 从 Hyprland 灵魂层面处决默认光标和一切位姿篡改
cursor {
    no_hardware_cursors = true
    enable_hyprcursor = false
    hide_on_key_press = true
    no_warps = true
}

# Beautiful animations
animations {
    enabled = false
}

# Misc settings
misc {
    vfr = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 0
}

# Debug — 启用日志便于排障
debug {
    disable_logs = false
}

# Input mapping (uinput from remote stream)
input {
    kb_layout = us
    follow_mouse = 1
    # Raw input directly from Wayland/uinput
    sensitivity = 0
    accel_profile = flat
}

# Basic Desktop Keybindings (Super Key)
$mainMod = SUPER
bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, F, fullscreen, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, E, exec, dolphin

