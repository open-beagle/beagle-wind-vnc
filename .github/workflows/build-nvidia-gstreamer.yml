name: Build GStreamer Base Image

on:
  push:
    branches:
      - nvidia-gstreamer

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: vnc/.beagle/nvidia-gstreamer.Dockerfile
          push: true
          tags: registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:build-1.24.6
          cache-from: type=registry,ref=registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:buildcache-1.24.6
          cache-to: type=registry,ref=registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:buildcache-1.24.6,mode=max
