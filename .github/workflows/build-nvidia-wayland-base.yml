name: Build Nvidia Wayland Base Image

on:
  push:
    branches:
      - nvidia-wayland-base

jobs:
  build-nvidia-wayland-base:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push Docker image - nvidia-wayland-base
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./.beagle/nvidia-wayland-base.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:nvidia-wayland-base-2604
            ghcr.io/${{ github.repository }}:nvidia-wayland-base-latest
            registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:nvidia-wayland-base-2604
            registry.cn-qingdao.aliyuncs.com/wod/beagle-wind-vnc:nvidia-wayland-base-latest
          platforms: linux/amd64
          no-cache: true

      - name: Image push success - nvidia-wayland-base
        run: echo "Docker image pushed successfully to ghcr.io and registry.cn-qingdao.aliyuncs.com"
