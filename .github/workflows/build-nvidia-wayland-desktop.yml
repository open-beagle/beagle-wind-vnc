name: Build Nvidia Wayland Desktop Image

on:
  push:
    branches:
      - nvidia-wayland-desktop

jobs:
  build-nvidia-wayland-desktop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image - nvidia-wayland-desktop
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./.beagle/nvidia-wayland-desktop.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:1.1.0
          platforms: linux/amd64
          build-args: |
            BASE=ghcr.io/open-beagle/beagle-wind-vnc:nvidia-wayland-base-latest
          no-cache: true

      - name: Image push success
        run: echo "Docker image pushed successfully to ghcr.io/${{ github.repository }}:1.1.0"
