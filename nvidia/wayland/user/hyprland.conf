# =============================================================================
# Full Desktop Hyprland Config for Beagle-Wind Cloud Gaming
# =============================================================================

monitor=,preferred,auto,1,bitdepth,10

# Environment Variables for nested execution
env = AQ_NO_LINUX_DMABUF,1
env = WLR_RENDERER,pixman
# env = WLR_DRM_NO_ATOMIC,1

# Execute essential desktop components (Waybar, Wallpaper)
exec-once = waybar & hyprpaper &

# General aesthetic settings
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# Decoration (Rounding, Blur, Shadows)
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# Beautiful animations
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Misc settings
misc {
    vfr = false
    disable_hyprland_logo = false
    disable_splash_rendering = false
    vrr = 1
}

# Input mapping (uinput from remote stream)
input {
    kb_layout = us
    follow_mouse = 1
    # Raw input directly from Wayland/uinput
    sensitivity = 0
    accel_profile = flat
}

# Basic Desktop Keybindings (Super Key)
$mainMod = SUPER
bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, F, fullscreen, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, E, exec, dolphin

# Window Rules to ensure games do not get interfered with by layouts
windowrulev2 = fullscreen,class:^steam_app_\d+$
windowrulev2 = workspace 1,class:^steam_app_\d+$
